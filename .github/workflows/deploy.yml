name: CI/CD Deploy Go App to Server

on:
  push:
    branches: [ "main" ] # Kích hoạt khi bạn push code vào nhánh main

jobs:
  build-and-push:
    # Bước build vẫn dùng máy chủ của GitHub để tiết kiệm tài nguyên cho server nhà bạn
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/labet-backend:latest

  deploy:
    needs: build-and-push
    # SỬA TẠI ĐÂY: Dùng runner bạn vừa cài trên Ubuntu Proxmox
    runs-on: self-hosted
    steps:
      - name: Pull and Run Container
        run: |
          # 1. Tải bản image mới nhất từ Docker Hub về chính máy này
          docker pull ${{ secrets.DOCKER_USERNAME }}/labet-backend:latest

          # 2. Dừng và xóa container cũ nếu đang chạy
          docker stop labet-app || true
          docker rm labet-app || true

          # 3. Chạy container mới trực tiếp trên server
          # Sử dụng cổng 8080 và cấu hình kết nối tới Postgres
          docker run -d \
            --name labet-app \
            -p 8080:8080 \
            --add-host=host.docker.internal:host-gateway \
            ${{ secrets.DOCKER_USERNAME }}/labet-backend:latest

          # 4. Dọn dẹp các image cũ để tránh đầy ổ cứng server
          docker image prune -f
