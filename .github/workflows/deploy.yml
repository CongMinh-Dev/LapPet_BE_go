name: CI/CD Deploy Go App to Server

on:
  push:
    branches: [ "main" ] # Kích hoạt khi bạn push code vào nhánh main

jobs:
  build-and-push:
    # Giai đoạn build vẫn sử dụng máy chủ của GitHub để tiết kiệm tài nguyên cho server Proxmox
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/labet-backend:latest

  deploy:
    needs: build-and-push
    # SỬA TẠI ĐÂY: Sử dụng runner bạn đã cài đặt trên Ubuntu Proxmox
    runs-on: self-hosted
    steps:
      - name: Pull and Run Container
        run: |
          # 1. Tải bản image mới nhất từ Docker Hub về chính máy Proxmox của bạn
          docker pull ${{ secrets.DOCKER_USERNAME }}/labet-backend:latest

          # 2. Dừng và xóa container cũ nếu đang chạy để tránh xung đột cổng/tên
          docker stop labet-app || true
          docker rm labet-app || true

          # 3. Chạy container mới trực tiếp trên server
          # Thêm tham số --restart always để container tự khởi động cùng máy chủ
          docker run -d \
            --name labet-app \
            --restart always \
            -p 8080:8080 \
            --add-host=host.docker.internal:host-gateway \
            ${{ secrets.DOCKER_USERNAME }}/labet-backend:latest

          # 4. Dọn dẹp các image cũ để tối ưu dung lượng ổ cứng cho server
          docker image prune -f
