name: CI/CD Deploy Go App to Server

on:
  push:
    branches: [ "main" ] # Kích hoạt khi bạn push code vào nhánh main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Tên image sẽ là: congminhdevlxag/labet-backend:latest
          tags: ${{ secrets.DOCKER_USERNAME }}/labet-backend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            # 1. Tải bản image mới nhất từ Docker Hub về server
            docker pull ${{ secrets.DOCKER_USERNAME }}/labet-backend:latest

            # 2. Dừng và xóa container cũ nếu đang chạy (để tránh trùng tên/cổng)
            docker stop labet-app || true
            docker rm labet-app || true

            # 3. Chạy container mới
            # -p 8080:8080 (đổi port nếu code Go của bạn dùng port khác)
            # --add-host cho phép Go kết nối tới Postgres ở bên ngoài container thông qua 'host.docker.internal'
            docker run -d \
              --name labet-app \
              -p 8080:8080 \
              --add-host=host.docker.internal:host-gateway \
              ${{ secrets.DOCKER_USERNAME }}/labet-backend:latest

            # 4. Dọn dẹp các image cũ không dùng tới để tiết kiệm dung lượng server
            docker image prune -f
